name: resume-screening-env
description: Resume screening OpenEnv environment
version: 1.0

entrypoint: server.app:main

actions:
  type: string
  enum:
    - shortlist
    - reject

observations:
  type: object
  properties:
    resume:
      type: string
    job:
      type: string

reward:
  type: number

tasks:
  - easy
  - medium
  - hard
